<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f2efe9;
color:#4b4b4b;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:40px 20px;
}

.intro{
font-size:18px;
line-height:1.6;
margin-bottom:30px;
}

.nombres{
font-family:'Great Vibes', cursive;
font-size:48px;
margin-bottom:30px;
}

.foto-boda{
width:250px;
height:250px;
border-radius:50%;
object-fit:cover;
margin:20px auto 40px auto;
display:block;
box-shadow:0 10px 25px rgba(0,0,0,.25);
opacity:0;
transform:scale(.9);
animation:aparecerFoto 1.2s ease forwards;
animation-delay:.5s;
}

@keyframes aparecerFoto{
to{
opacity:1;
transform:scale(1);
}
}

.nos-casamos{
font-size:36px;
letter-spacing:3px;
margin-top:40px;
margin-bottom:10px;
opacity:0;
transform:translateY(20px);
animation:aparecerTexto 1.2s ease forwards;
animation-delay:1s;
}

@keyframes aparecerTexto{
to{
opacity:1;
transform:translateY(0);
}
}

.fecha{
font-size:28px;
font-weight:500;
margin:10px 0 30px 0;
}

.seccion{
margin-top:40px;
}

.titulo{
font-size:20px;
letter-spacing:2px;
margin-bottom:10px;
}

.lugar{
font-size:22px;
font-weight:500;
margin-bottom:5px;
}

.hora{
font-size:18px;
margin-bottom:10px;
}

.vestimenta{
font-size:18px;
}

.final{
margin-top:60px;
font-size:20px;
}

.nombres-final{
font-family:'Great Vibes', cursive;
font-size:40px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<p class="intro">
Te invitamos a celebrar con nosotros uno de los días más importantes de nuestra vida
</p>

<div class="nombres">
Bryan & Luciana
</div>

<img src="foto.jpg" class="foto-boda">

<div class="nos-casamos">
Nos casamos
</div>

<div class="fecha">
27 de Junio 2026
</div>

<div class="seccion">

<div class="titulo">
Ceremonia & Recepción
</div>

<div class="lugar">
Quinta Mirasol
</div>

<div class="hora">
4:30 PM
</div>

</div>

<div class="seccion">

<div class="titulo">
Código de vestimenta
</div>

<div class="vestimenta">
Formal / Elegante
</div>

</div>

<div class="final">
Te esperamos
</div>

<div class="nombres-final">
Bryan & Luciana
</div>

</div>

</body>
</html>

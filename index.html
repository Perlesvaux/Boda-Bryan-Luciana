<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryan & Luciana</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3efe8;
font-family:'Playfair Display',serif;
color:#2e2e2e;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* SOBRE */

#envelope-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:80px;
background:#f3efe8;
z-index:10;
}

#instruction{
font-family:'Great Vibes',cursive;
font-size:34px;
color:#b48a3a;
text-align:center;
margin-bottom:35px;
}

#instruction:after{
content:"";
display:block;
width:120px;
height:1px;
background:#b48a3a;
margin:10px auto 0 auto;
opacity:0.6;
}

.envelope{
width:420px;
height:250px;
background:#e6dccd;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
overflow:hidden;
}

.flap{
position:absolute;
top:0;
width:100%;
height:100%;
background:#d9ccb8;
clip-path:polygon(0 0,100% 0,50% 55%);
transition:1s ease;
transform-origin:top;
}

.seal{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:white;
font-size:17px;
background:radial-gradient(circle at 30% 30%, #e2b44a, #b8831c 70%);
box-shadow:
inset -3px -4px 8px rgba(0,0,0,0.4),
inset 3px 3px 6px rgba(255,230,150,0.5),
0 6px 15px rgba(0,0,0,0.3);
}

/* CONTENIDO */

#content{
display:none;
padding-top:120px;
}

.section{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:40px 20px;
text-align:center;
}

/* HERO */

.names{
font-family:'Great Vibes',cursive;
font-size:72px;
color:white;
-webkit-text-stroke:1.3px black;
margin-bottom:25px;
}

.subtitle{
font-size:22px;
margin:10px 0;
}

.countdown{
margin-top:15px;
font-size:18px;
}

/* Botones */

.button{
display:inline-block;
margin:20px 10px;
padding:10px 26px;
border:1px solid #b48a3a;
color:#b48a3a;
text-decoration:none;
border-radius:30px;
font-size:15px;
transition:0.3s;
background:white;
cursor:pointer;
}

.button:hover{
background:#b48a3a;
color:white;
}

/* RSVP */

.rsvp-form{
margin-top:20px;
display:none;
}

.rsvp-form input,
.rsvp-form select{
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* Footer */

.footer-love{
margin-top:120px;
padding:40px 0;
font-family:'Great Vibes',cursive;
font-size:36px;
border-top:1px solid #d8cfc1;
color:#b48a3a;
text-align:center;
}

/* Pétalos */

.petal{
position:fixed;
top:-10px;
width:12px;
height:12px;
background:#d88aa3;
border-radius:50%;
opacity:0.8;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div id="envelope-container">
<div id="instruction">Haz clic en el sobre</div>
<div class="envelope" onclick="openInvitation()">
<div class="flap" id="flap"></div>
<div class="seal">B & L</div>
</div>
</div>

<div id="content">

<section class="section">

<div class="names">Bryan & Luciana</div>

<div class="subtitle">Nos casamos el día</div>
<div class="subtitle">27 de Junio 2026</div>

<div id="countdown" class="countdown"></div>

<div class="subtitle">4:30 PM</div>

<a class="button" href="https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7" target="_blank">
Ver ubicación
</a>

<a class="button" onclick="addToCalendar()">
Agregar al Calendario
</a>

<button class="button" onclick="toggleRSVP()">Confirmar Asistencia</button>

<div class="rsvp-form" id="rsvpForm">
<form action="https://formsubmit.co/TUEMAILAQUI@gmail.com" method="POST">
<input type="text" name="Nombre" placeholder="Tu nombre" required>
<select name="Asistencia" required>
<option value="">¿Asistirás?</option>
<option value="Sí asistiré">Sí asistiré</option>
<option value="No podré asistir">No podré asistir</option>
</select>
<input type="hidden" name="_captcha" value="false">
<br>
<button type="submit" class="button">Enviar Confirmación</button>
</form>
</div>

</section>

<div class="footer-love">
Con amor
</div>

</div>

<script>

window.onload=function(){
document.getElementById("content").style.display="none";
document.getElementById("envelope-container").style.display="flex";
}

function openInvitation(){
document.getElementById("flap").style.transform="rotateX(180deg)";
createPetals();

setTimeout(()=>{
document.getElementById("envelope-container").style.display="none";
document.getElementById("content").style.display="block";
},1000);
}

function createPetals(){
for(let i=0;i<30;i++){
let petal=document.createElement("div");
petal.classList.add("petal");
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*3)+"s"; /* 2 segundos más */
document.body.appendChild(petal);
setTimeout(()=>{petal.remove();},8000);
}
}

function toggleRSVP(){
let form=document.getElementById("rsvpForm");
form.style.display=form.style.display==="block"?"none":"block";
}

var eventDate=new Date("June 27, 2026 16:30:00").getTime();

setInterval(function(){
var now=new Date().getTime();
var distance=eventDate-now;

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML=
"Faltan "+days+" días "+hours+"h "+minutes+"m";
},1000);

function addToCalendar(){
var start="20260627T163000";
var end="20260627T213000";

var url="https://calendar.google.com/calendar/render?action=TEMPLATE"
+"&text=Boda Bryan y Luciana"
+"&dates="+start+"/"+end
+"&details=Nos encantaría que nos acompañes"
+"&location=https://maps.app.goo.gl/gLvbVXCNgGFLqSWH7";

window.open(url);
}

</script>

</body>
</html>
